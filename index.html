<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Ford Brasil | Nova Ford Ranger 2022</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="topo">
        <img src="img/logo-ford-256.png" alt="Logo" />
      </div>
      <nav class="menu-topo">
        <a href="index.html">Home</a>
        <a href="lancamento.html">Lançamento</a>
        <a href="contato.html">Contato</a>
      </nav>
      <div class="espaco-topo"></div>
    </header>
    <main class="home">
      <section class="home-conteudo">
        <div class="texto2-home">
          <p>
            <strong
              >
                A INOVAÇÃO QUE MOVE GERAÇÕES
              </strong
            >
          </p>
        </div>

        <div class="imagem-home">
          <a id="carousel-link" href="lancamento.html">
            <img id="carousel" src="img/imagem_1.jpg" alt="Ranger Preta" />
          </a>
          <div class="carousel-dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
          </div>
        </div>

        <div class="carousel-miniaturas">
  <img
    class="miniatura active-thumb"
    src="img/imagem_1.jpg"
    data-index="0"
    alt=""
  />

  <img
    class="miniatura"
    src="img/imagem_2.jpg"
    data-index="1"
    alt=""
  />

  <img
    class="miniatura"
    src="img/imagem_3.jpg"
    data-index="2"
    alt=""
  />
</div>

        <div class="texto-home">
          <p id="carousel-title"></p>
        </div>
      </section>
    </main>
    <footer>
      <div class="redes-sociais">
        <nav class="logos-redes-sociais">
          <a
            href="https://www.facebook.com/FordBrasil/"
            target="_blank"
            rel="noopener noreferrer"
            ><img src="img/facebook-50.png" alt="Logo Facebook"
          /></a>
          <a
            href="https://www.youtube.com/fordbrasil"
            target="_blank"
            rel="noopener noreferrer"
            ><img src="img/youtube-squared-50.png" alt="Logo youtube"
          /></a>
          <a
            href="https://www.instagram.com/fordbrasil/"
            target="_blank"
            rel="noopener noreferrer"
            ><img src="img/instagram-logo-50.png" alt="Logo Instagram"
          /></a>
        </nav>
      </div>
      <a
        href="https://www.ford.com.br/copyright/"
        target="_blank"
        rel="noopener noreferrer"
        class="copyright"
        >© 2026 Ford Motor Company - Todos os direitos reservados</a
      >

      <a
        href="https://www.ford.com.br/copyright/"
        target="_blank"
        rel="noopener noreferrer"
        class="copyright-mobile"
        >© 2026</a
      >

      <div class="logo-footer">
        <img src="img/ford-96.png" alt="logo ford" />
      </div>
    </footer>

    <script src="js/carousel.js"></script>
  </body>
</html>
