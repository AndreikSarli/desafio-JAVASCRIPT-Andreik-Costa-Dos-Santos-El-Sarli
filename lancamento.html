<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Conheça a nova Ford Ranger 2022 | Ford Brasil</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <div class="topo">
        <img src="img/logo-ford-256.png" alt="Logo" />
      </div>
      <nav class="menu-topo">
        <a href="index.html">Home</a>
        <a href="lancamento.html">Lançamento</a>
        <a href="contato.html">Contato</a>
      </nav>
      <div class="espaco-topo"></div>
    </header>
    <main>
      <section class="lancamento-topo">
        <div class="video-lancamento">
          <iframe
            width="560"
            height="315"
            src="https://www.youtube.com/embed/vQsryuNmsL0?autoplay=1&mute=1&rel=0"
            title="YouTube video player"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
              web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
        <p class="descricao-video">
          Conheça a nova Ford Ranger 2022, com mais tecnologia, potência e
          desempenho para qualquer terreno.
        </p>
        <div class="imagens-lancamento">
          <div class="carro">
            <label for="carro1" class="area-click">
              <img
                class="img-carro"
                src="img/XL Cabine.jpg"
                alt="Ranger-cabine"
              />
            </label>
            <label class="carro-info" for="carro1">
              <input type="checkbox" id="carro1" />
              XL Cabine Simples 2.2 Diesel <br />4X4 MT 2022<img
                src="img/info.png"
                alt="info"
            /></label>
            <div class="preco1">
            <p class="preco">A partir de R$ 183.850</p>
            </div>
          </div>

          <div class="carro">
            <label for="carro2" class="area-click">
              <img
              class="img-carro"
              src="img/xls 2.2 diesel.jpg"
              alt="Ranger-Xls"
            />
            </label>
            <label class="carro-info">
              <input type="checkbox" id="carro2"/> XLS 2.2 Diesel 4x4 AT 2022<img
                src="img/info.png"
                alt="info"
            /></label>
            <p class="preco">A partir de R$ 220.690</p>
          </div>

          <div class="carro">
            <label for="carro3" class="area-click">
            <img class="img-carro" src="img/storm.jpg" alt="Ranger-Storm" />
            </label>
            <label class="carro-info">
              <input type="checkbox" id="carro3" /> Storm 3.2 Diesel 4X4 AT 2022<img
                src="img/info.png"
                alt="info"
            /></label>
            <p class="preco">A partir de R$ 222.790</p>
          </div>
        </div>
        <div class="comparar">
          <button class="btn-comparar">Comparar</button>
        </div>
      </section>
    </main>

    <footer>
      <div class="redes-sociais">
        <nav class="logos-redes-sociais">
          <a
            href="https://www.facebook.com/FordBrasil/"
            target="_blank"
            rel="noopener noreferrer"
            ><img src="img/facebook-50.png" alt="Logo Facebook"
          /></a>
          <a
            href="https://www.youtube.com/fordbrasil"
            target="_blank"
            rel="noopener noreferrer"
            ><img src="img/youtube-squared-50.png" alt="Logo youtube"
          /></a>
          <a
            href="https://www.instagram.com/fordbrasil/"
            target="_blank"
            rel="noopener noreferrer"
            ><img src="img/instagram-logo-50.png" alt="Logo Instagram"
          /></a>
        </nav>
      </div>
      <a
        href="https://www.ford.com.br/copyright/"
        target="_blank"
        rel="noopener noreferrer"
        class="copyright"
        >© 2026 Ford Motor Company - Todos os direitos reservados</a
      >
         <a
        href="https://www.ford.com.br/copyright/"
        target="_blank"
        rel="noopener noreferrer"
        class="copyright-mobile"
        >© 2026 Ford</a
      >
      
      <div class="logo-footer">
        <img src="img/ford-96.png" alt="logo ford" />
      </div>
    </footer>
  </body>
</html>
